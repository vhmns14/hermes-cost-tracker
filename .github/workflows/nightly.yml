name: Nightly Demo

on:
  schedule:
    - cron: "23 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  nightly:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - name: Regenerate demo dashboard
        run: |
          python tracker.py selftest
          python tracker.py dashboard --file examples/demo-usage.jsonl --out examples/dashboard.html
          python tracker.py report --file examples/demo-usage.jsonl --json > examples/demo-report.json
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet examples/; then
            git add examples/
            git commit -m "chore: refresh demo dashboard"
            git push
          else
            echo "No changes"
          fi
